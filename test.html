<!DOCTYPE html>
<html>
<head>
    <title>TEST</title>
    <script src="script.js"></script>
    <style>
        body { font-family: Arial; padding: 50px; background: #000; color: #fff; }
        input, button { padding: 10px; margin: 10px; font-size: 16px; }
        video { max-width: 400px; margin: 20px 0; }
        #progress { width: 100%; height: 20px; background: #333; margin: 20px 0; }
        #progressFill { height: 100%; background: #00ff88; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>
    <h1>🔥 AI ENHANCE TEST</h1>
    <input type="file" id="videoInput" accept="video/*">
    <br>
    <video id="previewVideo" controls></video>
    <br>
    <button id="enhanceBtn">🚀 ENHANCE</button>
    <div id="progressContainer" style="display:none;">
        <div id="progress"><div id="progressFill"></div></div>
        <div id="progressText">0%</div>
    </div>
    <script>
        // TEST SCRIPT - COPIES MAIN LOGIC
        document.getElementById('videoInput').onchange = function(e) {
            const video = document.getElementById('previewVideo');
            video.src = URL.createObjectURL(e.target.files[0]);
            video.style.display = 'block';
        };
        
        document.getElementById('enhanceBtn').onclick = function() {
            let p = 0;
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            const container = document.getElementById('progressContainer');
            container.style.display = 'block';
            
            const int = setInterval(() => {
                p += 10;
                fill.style.width = p + '%';
                text.textContent = p + '%';
                if (p >= 100) {
                    clearInterval(int);
                    setTimeout(() => {
                        container.style.display = 'none';
                        alert('✅ WORKS PERFECTLY!');
                    }, 500);
                }
            }, 300);
        };
    </script>
</body>
</html>
